<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unified Calendar</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
  <link rel="stylesheet" href="/styles.css" />
  <!-- FullCalendar (month/week/day views) from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
</head>
<body>
  <header class="topbar">
    <h1>📅 Unified Calendar</h1>
    <div class="topbar-right">
      <div class="status" id="status"><!-- compact connection chips --></div>
      <div class="jump-to">
        <select id="jump-month">
          <option value="0">January</option>
          <option value="1">February</option>
          <option value="2">March</option>
          <option value="3">April</option>
          <option value="4">May</option>
          <option value="5">June</option>
          <option value="6">July</option>
          <option value="7">August</option>
          <option value="8">September</option>
          <option value="9">October</option>
          <option value="10">November</option>
          <option value="11">December</option>
        </select>
        <select id="jump-year"><!-- populated by JS --></select>
      </div>
      <span class="last-synced" id="last-synced"></span>
      <button id="sync-btn" class="sync-btn" title="Refresh events from all calendars"><span class="sync-icon">⟳</span> Sync</button>
      <a class="settings-link" href="/settings.html">⚙ Settings</a>
    </div>
  </header>

  <div id="banner" class="banner hidden"></div>

  <div class="layout">
    <aside class="sidebar">
      <h2>Calendars</h2>
      <ul id="calendars" class="cal-list"></ul>
      <button class="new-event-btn hidden" id="new-event-btn">+ New event</button>
      <div class="provider-links">
        <button class="provider-link-btn" id="open-google">Google Calendar ↗</button>
        <button class="provider-link-btn" id="open-outlook">Outlook ↗</button>
      </div>
    </aside>
    <main>
      <div id="calendar"></div>
    </main>
  </div>

  <!-- Event details modal -->
  <div id="event-modal" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      <h3 id="modal-title"></h3>
      <div class="modal-row" id="modal-cal"></div>
      <div class="modal-row" id="modal-time"></div>
      <div class="modal-row" id="modal-location"></div>
      <div class="modal-desc" id="modal-description"></div>
      <a class="modal-open" id="modal-open" href="#" target="_blank" rel="noopener">Open original ↗</a>
      <button class="modal-edit hidden" id="modal-edit">Edit</button>
    </div>
  </div>

  <!-- Day-view modal (opened by clicking an empty day in month view) -->
  <div id="day-modal" class="modal-overlay hidden">
    <div class="modal day-modal-box" role="dialog" aria-modal="true">
      <button class="modal-close" id="day-modal-close" aria-label="Close">✕</button>
      <h3 id="day-modal-title"></h3>
      <div id="day-calendar"></div>
    </div>
  </div>

  <!-- Event create / edit form modal -->
  <div id="event-form-modal" class="modal-overlay hidden">
    <div class="modal event-form" role="dialog" aria-modal="true" aria-labelledby="ef-heading">
      <button class="modal-close" id="ef-close" aria-label="Close">✕</button>
      <h3 id="ef-heading">New event</h3>
      <form id="ef-form">
        <div class="form-field">
          <label for="ef-title">Title</label>
          <input type="text" id="ef-title" placeholder="Event title" autocomplete="off" required />
        </div>
        <div class="form-field form-field-row">
          <label for="ef-allday">All day</label>
          <input type="checkbox" id="ef-allday" />
        </div>
        <div class="form-field">
          <label for="ef-start">Start</label>
          <input type="datetime-local" id="ef-start" required />
        </div>
        <div class="form-field">
          <label for="ef-end">End</label>
          <input type="datetime-local" id="ef-end" />
        </div>
        <div class="form-field">
          <label for="ef-cal">Calendar</label>
          <select id="ef-cal"></select>
        </div>
        <div class="form-field">
          <label for="ef-loc">Location</label>
          <input type="text" id="ef-loc" placeholder="Optional" autocomplete="off" />
        </div>
        <div class="form-field">
          <label for="ef-desc">Description</label>
          <textarea id="ef-desc" rows="3" placeholder="Optional"></textarea>
        </div>
        <div class="ef-actions">
          <button type="button" id="ef-delete" class="danger hidden">Delete</button>
          <div class="ef-actions-right">
            <button type="button" id="ef-cancel">Cancel</button>
            <button type="submit" id="ef-save" class="primary">Save</button>
          </div>
        </div>
      </form>
    </div>
  </div>

  <!-- Search modal -->
  <div id="search-modal" class="modal-overlay hidden">
    <div class="search-box">
      <input type="text" id="search-input" class="search-input" placeholder="Search events or jump to date…" autocomplete="off" spellcheck="false" />
      <ul id="search-results" class="search-results"></ul>
      <div class="search-hint">↑↓ navigate · Enter select · Esc close</div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
